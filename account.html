<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick Our Night — Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night: #14162B;
    --night-2: #1D2044;
    --panel: #23264A;
    --pink: #FF5D8F;
    --amber: #FFC857;
    --text: #F2EFEA;
    --muted: #9296C4;
    --line: rgba(242,239,234,0.12);
    --radius: 14px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(255,93,143,0.14), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(255,200,87,0.10), transparent 45%),
      var(--night);
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
  }
  .wrap{ max-width: 1180px; margin: 0 auto; padding: 20px 20px 80px; }

  .accountbar{
    display:flex; justify-content:space-between; align-items:center;
    padding: 10px 18px; background: var(--panel); border:1px solid var(--line);
    border-radius: var(--radius); margin-bottom: 26px;
  }
  .accountbar .who{ font-size:13px; color: var(--muted); }
  .accountbar .who b{ color: var(--text); }
  .btn{
    border:none; cursor:pointer; font-family:'IBM Plex Mono',monospace; letter-spacing:.06em;
    text-transform:uppercase; font-size:12px; padding:9px 15px; border-radius:8px;
    background: var(--amber); color:#20200c; font-weight:600; transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{ transform: translateY(-1px); box-shadow:0 4px 14px rgba(255,200,87,.35); }
  .btn.secondary{ background: transparent; color: var(--text); border:1px solid var(--line); }
  .btn.pink{ background: var(--pink); color:#2a0c17; }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

  .hero{ text-align:center; padding: 6px 0 30px; border-bottom: 1px solid var(--line); margin-bottom: 30px; }
  h1{
    font-family:'Monoton', cursive; font-weight:400; letter-spacing:.03em;
    font-size: clamp(28px, 5vw, 44px); margin:0 0 8px;
    color: var(--pink);
    text-shadow: 0 0 18px rgba(255,93,143,0.55), 0 0 46px rgba(255,93,143,0.25);
    line-height:1.1;
  }
  .hero p{ color: var(--muted); max-width: 480px; margin: 0 auto; font-size:14px; }

  .screen{ max-width: 420px; margin: 0 auto; }
  .panel{
    background: var(--panel); border:1px solid var(--line); border-radius: var(--radius);
    padding: 20px 22px;
  }
  .panel h2{
    font-size: 13px; text-transform:uppercase; letter-spacing:.14em; color: var(--muted);
    font-family:'IBM Plex Mono', monospace; margin: 0 0 16px; display:flex; align-items:center; gap:8px;
  }
  .panel h2 .dot{ width:6px;height:6px;border-radius:50%; background: var(--amber); box-shadow:0 0 8px var(--amber); }

  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-size:12px; color: var(--muted); margin-bottom:5px; font-family:'IBM Plex Mono',monospace; }
  input[type=text]{
    width:100%; background: var(--night-2); border:1px solid var(--line); color: var(--text);
    padding: 10px 12px; border-radius:8px; font-family:'Work Sans',sans-serif; font-size:14px;
  }
  .note{ font-size:11.5px; color: var(--muted); margin-top:10px; line-height:1.5; }
  .status{ font-size:12.5px; margin-top:10px; display:none; }
  .status.show{ display:block; }
  .status.ok{ color: var(--amber); }
  .status.err{ color: var(--pink); }

  .back-link{ display:block; text-align:center; margin-top:16px; font-size:12px; color: var(--muted); cursor:pointer; text-decoration:underline; }

  footer{ text-align:center; margin-top: 40px; font-size:11px; color: var(--muted); font-family:'IBM Plex Mono',monospace; }

  .loading-screen{
    position:fixed; inset:0; z-index:9999; background: var(--night);
    display:flex; align-items:center; justify-content:center;
  }
  .loading-screen.hide{ display:none; }
  .loading-text{
    font-family:'IBM Plex Mono',monospace; color: var(--amber); letter-spacing:.1em; font-size:13px;
    animation: pulse-loading 1.2s ease-in-out infinite;
  }
  @keyframes pulse-loading{ 0%,100%{ opacity:.5; } 50%{ opacity:1; } }
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
  <div class="loading-text">— loading your account —</div>
</div>
<div class="wrap">

  <div class="accountbar">
    <div class="who">Signed in as <b id="whoName">You</b></div>
    <button class="btn secondary" id="logoutBtn">Log out</button>
  </div>

  <div class="hero">
    <h1>Your Account</h1>
    <p>Update the name your partner sees when you're both signed in.</p>
  </div>

  <div class="screen">
    <div class="panel">
      <h2><span class="dot"></span>Display name</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" id="displayNameInput" placeholder="Your name">
      </div>
      <button class="btn pink" id="saveNameBtn" style="width:100%;">Save name</button>
      <div class="status" id="statusMsg"></div>
      <div class="note">This is just a display label — it doesn't change your login email.</div>
    </div>
    <a class="back-link" id="backLink">← Back to your plan</a>
  </div>

  <footer>Signed in — account settings for Pick Our Night.</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

// Must match the config used in index.html, mood.html, and plan.html — same Firebase project.
const firebaseConfig = {
  apiKey: "AIzaSyCaRo7wJHEw2gXIDMhgbcxTvgzV1CcfDeQ",
  authDomain: "pick-our-night.firebaseapp.com",
  projectId: "pick-our-night",
  storageBucket: "pick-our-night.firebasestorage.app",
  messagingSenderId: "595479555026",
  appId: "1:595479555026:web:60b31e8624c4c12752360b",
  measurementId: "G-VMFQZJPQRD"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = 'index.html';
    return;
  }
  currentUser = user;
  document.getElementById('whoName').textContent = user.displayName || user.email;
  document.getElementById('displayNameInput').value = user.displayName || '';
  document.getElementById('loadingScreen').classList.add('hide');
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = 'index.html';
});

document.getElementById('backLink').addEventListener('click', () => {
  window.location.href = 'plan.html';
});

const statusMsg = document.getElementById('statusMsg');
function showStatus(message, isError){
  statusMsg.textContent = message;
  statusMsg.className = `status show ${isError ? 'err' : 'ok'}`;
}

document.getElementById('saveNameBtn').addEventListener('click', async () => {
  const newName = document.getElementById('displayNameInput').value.trim();
  if(!newName){
    showStatus('Enter a name first.', true);
    return;
  }
  const saveBtn = document.getElementById('saveNameBtn');
  saveBtn.disabled = true;
  try{
    await updateProfile(currentUser, { displayName: newName });
    document.getElementById('whoName').textContent = newName;
    showStatus('Saved.', false);
  }catch(e){
    console.error('Failed to update display name', e);
    showStatus('Something went wrong — try again.', true);
  }finally{
    saveBtn.disabled = false;
  }
});
</script>
</body>
</html>
